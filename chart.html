<!-- using 3dforcegraph create a weighted digraph, given a section of text, let every word be a node in order of appearance from within the text. allow nodes and edges to increase in brightness/vibrancy in accordance to number of times a word/phrase is repeated. allow punctuation marks like .?! mark the ends of strings to input into the graph.

words → nodes
word transitions → directed edges
. ? ! terminate strings
repeated words increase node size + brightness
repeated phrases increase edge thickness + brightness
arrows for direction
lowercase normalization -->


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Transition Graph</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #graph {
      width: 100vw;
      height: 100vh;
    }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;

      padding: 10px;

      color: white;

      background: rgba(0,0,0,0.7);

      border-radius: 8px;

      z-index: 1000;

      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="graph"></div>

<div id="info">
  Word Transition Graph
</div>

<script type="module">

import ForceGraph3D from "https://esm.sh/3d-force-graph";
import SpriteText from "https://esm.sh/three-spritetext";


const text = `
The Indians, Columbus reported, “are so naïve and so free with their possessions that no one who has not witnessed them would believe it. When you ask for something they have, they never say no. To the contrary, they offer to share with anyone. . . .” He concluded his report by asking for a little help from their Majesties, and in return he would bring them from his next voyage “as much gold as they need . . . and as many slaves as they ask.” He was full of religious talk: “Thus the eternal God, our Lord, gives victory to those who follow His way over apparent impossibilities.”

Because of Columbus’s exaggerated report and promises, his second expedition was given seventeen ships and more than twelve hundred men. The aim was clear: slaves and gold. They went from island to island in the Caribbean, taking Indians as captives. But as word spread of the Europeans’ intent they found more and more empty villages. On Haiti, they found that the sailors left behind at Fort Navidad had been killed in a battle with the Indians, after they had roamed the island in gangs looking for gold, taking women and children as slaves for sex and labor.

Now, from his base on Haiti, Columbus sent expedition after expedition into the interior. They found no gold fields, but had to fill up the ships returning to Spain with some kind of dividend. In the year 1495, they went on a great slave raid, rounded up fifteen hundred Arawak men, women, and children, put them in pens guarded by Spaniards and dogs, then picked the five hundred best specimens to load onto ships. Of those five hundred, two hundred died en route. The rest arrived alive in Spain and were put up for sale by the archdeacon of the town, who reported that, although the slaves were “naked as the day they were born,” they showed “no more embarrassment than animals.” Columbus later wrote: “Let us in the name of the Holy Trinity go on sending all the slaves that can be sold.”

But too many of the slaves died in captivity. And so Columbus, desperate to pay back dividends to those who had invested, had to make good his promise to fill the ships with gold. In the province of Cicao on Haiti, where he and his men imagined huge gold fields to exist, they ordered all persons fourteen years or older to collect a certain quantity of gold every three months. When they brought it, they were given copper tokens to hang around their necks. Indians found without a copper token had their hands cut off and bled to death.

The Indians had been given an impossible task. The only gold around was bits of dust garnered from the streams. So they fled, were hunted down with dogs, and were killed.

Trying to put together an army of resistance, the Arawaks faced Spaniards who had armor, muskets, swords, horses. When the Spaniards took prisoners they hanged them or burned them to death. Among the Arawaks, mass suicides began, with cassava poison. Infants were killed to save them from the Spaniards. In two years, through murder, mutilation, or suicide, half of the 250,000 Indians on Haiti were dead.

When it became clear that there was no gold left, the Indians were taken as slave labor on huge estates, known later as encomiendas. They were worked at a ferocious pace, and died by the thousands. By the year 1515, there were perhaps fifty thousand Indians left. By 1550, there were five hundred. A report of the year 1650 shows none of the original Arawaks or their descendants left on the island.

The chief source—and, on many matters the only source—of information about what happened on the islands after Columbus came is Bartolomé de las Casas, who, as a young priest, participated in the conquest of Cuba. For a time he owned a plantation on which Indian slaves worked, but he gave that up and became a vehement critic of Spanish cruelty. Las Casas transcribed Columbus’s journal and, in his fifties, began a multivolume History of the Indies. In it, he describes the Indians. They are agile, he says, and can swim long distances, especially the women. They are not completely peaceful, because they do battle from time to time with other tribes, but their casualties seem small, and they fight when they are individually moved to do so because of some grievance, not on the orders of captains or kings.

`;



function parseText(text) {

  const nodeMap = new Map();

  const edgeMap = new Map();


  const sentences = text
    .split(/[.!?]+/)
    .map(s => s.trim())
    .filter(Boolean);



  function addNode(word) {

    if (!nodeMap.has(word)) {

      nodeMap.set(word, {
        id: word,
        count: 0
      });
    }

    const node = nodeMap.get(word);

    node.count++;

    return node;
  }



  function addEdge(source, target) {

    const key = source + "->" + target;

    if (!edgeMap.has(key)) {

      edgeMap.set(key, {
        source,
        target,
        count: 0
      });
    }

    edgeMap.get(key).count++;
  }



  for (const sentence of sentences) {

    const words = sentence
      .toLowerCase()
      .match(/\b[\w']+\b/g);

    if (!words) continue;


    for (let i = 0; i < words.length; i++) {

      addNode(words[i]);


      if (i < words.length - 1) {

        addEdge(
          words[i],
          words[i + 1]
        );
      }
    }
  }


  return {
    nodes: [...nodeMap.values()],
    links: [...edgeMap.values()]
  };
}



const graphData = parseText(text);



const maxNodeCount = Math.max(
  ...graphData.nodes.map(
    n => n.count
  )
);


const maxEdgeCount = Math.max(
  ...graphData.links.map(
    l => l.count
  )
);



function nodeBrightness(node) {

  return node.count / maxNodeCount;
}



function edgeBrightness(link) {

  return link.count / maxEdgeCount;
}



const graphElement =
  document.getElementById("graph");



const Graph =
  ForceGraph3D({
    controlType: "fly"
  })(graphElement)

  .graphData(graphData)

  .backgroundColor("#000000")


  .nodeVal(node =>
    4 + Math.sqrt(node.count) * 6
  )


  .nodeColor(node => {

    const brightness =
      nodeBrightness(node);

    const intensity =
      Math.floor(
        80 + brightness * 175
      );

    return `rgb(
      ${intensity},
      ${intensity},
      255
    )`;
  })


  .nodeThreeObject(node => {

    const sprite =
      new SpriteText(
        node.id
      );

    sprite.textHeight =
      8;

    const brightness =
      nodeBrightness(node);

    const intensity =
      Math.floor(
        80 + brightness * 175
      );

    sprite.color =
      `rgb(
        ${intensity},
        ${intensity},
        255
      )`;

    return sprite;
  })


  .nodeThreeObjectExtend(true)


  .nodeLabel(node =>
    `
    <b>${node.id}</b>
    <br>
    Count: ${node.count}
    `
  )


  .linkDirectionalArrowLength(6)

  .linkDirectionalArrowRelPos(1)


  .linkWidth(link =>
    1 + link.count * 1.5
  )


  .linkColor(link => {

    const brightness =
      edgeBrightness(link);

    const intensity =
      Math.floor(
        50 + brightness * 205
      );

    return `rgb(
      255,
      ${intensity},
      ${intensity}
    )`;
  })


  .linkOpacity(0.9)

  .d3VelocityDecay(0.3);



Graph.d3Force("charge")
  .strength(-250);



window.addEventListener(
  "resize",
  () => {

    Graph.width(
      window.innerWidth
    );

    Graph.height(
      window.innerHeight
    );
  }
);


</script>

</body>
</html>
